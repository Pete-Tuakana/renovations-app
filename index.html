<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Renovations App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>Renovation Mission Control</header>

<div class="container">

<div class="form-section">

<h2>Add Project</h2>

<label>Project Title</label>
<input id="titleInput" type="text" placeholder="Project title">

<label>Importance (1–5)</label>
<input id="importanceInput" type="number" min="1" max="5">

<label>Hours Required</label>
<input id="hoursInput" type="number">

<label>Deadline</label>
<input id="deadlineInput" type="date">

<button onclick="addProject()">Add Project</button>

</div>
  
<div class="form-section">

<h2>Available Time</h2>

<label>Hours Available</label>
<input id="availableTimeInput" type="number">

<button onclick="findBestProject()">Find Best Project</button>

</div>

<h2>Recommended Project</h2>
<div id="recommendedProject" class="mission-card">
  <strong>No recommendation yet.</strong>
</div>
  
  <section>
    <h2>Prioritized Projects</h2>
    <ul id="projectList"></ul>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
